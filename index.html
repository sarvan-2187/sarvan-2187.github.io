<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pill Pal AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pill Pal AI</h1>
        <form id="medication-form">
            <label for="medication-name">Medication Name:</label>
            <input type="text" id="medication-name" required>
            
            <label for="medication-datetime">Date and Time:</label>
            <input type="datetime-local" id="medication-datetime" required>
            
            <label for="medication-dosage">Dosage:</label>
            <input type="text" id="medication-dosage" required>
            
            <label for="weekly-frequency">Weekly Frequency:</label>
            <select id="weekly-frequency" required>
                <option value="1">Once a week</option>
                <option value="2">Twice a week</option>
                <option value="3">Three times a week</option>
                <option value="4">Four times a week</option>
                <option value="5">Five times a week</option>
                <option value="6">Six times a week</option>
                <option value="7">Every day</option>
            </select>
            
            <button type="submit">Add Reminder</button>
        </form>
        
        <h2>Your Reminders</h2>
        <ul id="reminder-list"></ul>
    </div>

    <!-- Reminder Popup -->
    <div id="reminder-popup" class="reminder-popup">
        <div class="reminder-content">
            <h3>Time to Take Your Medication!</h3>
            <p id="reminder-message"></p>
            <button onclick="closeReminder()">Close</button>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="reminder-sound" src="msg.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
